<!--Start the Main content-->
<main>
    <h1>Adopt-a-Dino</h1>
    <form method="get" class="form" action="thanks.html">
        <fieldset>
            <legend>Applicant Information</legend>
            <label> First Name* <input type="text" name="fname" required></label>
            <label> Last Name* <input type="text" name="lname" required></label>
            <label>Email Address* <input type="email" name="email" required placeholder="rexshome@gmail.com"></label>
            <label>Cell Number <input type="tel" name="phone" placeholder="123-333-1234"></label>
            <label> Preferred contact method:
                <select name="name">
                    <option value="none">Please Select</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone</option>
                    <option value="text">Text</option>

                </select>
            </label>

        </fieldset>


        <fieldset>
            <legend>Experience Level</legend>
            <label>
                <input type="radio" name="method" value="Never">I have never owned a reptile before</label>
            <label>
                <input type="radio" name="method" value="past"> I have owned a reptile in the past</label>
            <label>
                <input type="radio" name="method" value="current"> I currently own one or more reptiles</label>

        </fieldset>
        <fieldset>
            <legend>I understand and agree that:</legend>
            <label> <input type="checkbox" name="care" value="chosen" required> Reptiles require specialized
                care*</label>
            <label><input type="checkbox" name="commitment" value="chosen" required> I am prepared for a long-term
                commitment*</label>
            <label><input type="checkbox" name="forever" value="chosen" required> I will not rehome or sell this
                reptile*</label>
            <label><input type="checkbox" name="return" value="chosen" required> I will return the reptile to Rexs Home
                if I cannot care for it*</label>

            <label> Which reptile are you interested in?
                <select name="name">
                    <option value="none">Please Select</option>
                    <option value="Bearded Dragon">Aztec</option>
                    <option value="Orange Bearded Dragon">Creamsicle</option>
                    <option value="Green Tree Frog">Jimmy</option>
                    <option value="Box Turtle">Olive</option>
                    <option value="Leopard Gecko">Sushi</option>
                    <option value="Veiled Chameleon">Pie</option>
                    <option value="Baby Milk Snake">Milky</option>
                    <option value="Baby hognose snake">Hogrid</option>

                </select>
            </label>
        </fieldset>
        <label>Tell us anything else that will help us understand the home you'll provide.
            <textarea name="comments"></textarea>
        </label>
        <input type="submit" value="Apply">
    </form>




</main>
